# Render Blueprint. If the existing service was created manually, set the same
# Build/Start commands in its dashboard Settings (see README "Deploy" section).
services:
  - type: web
    name: hiring-assistant
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # Must bind 0.0.0.0 and Render's $PORT — a hardcoded port (e.g. 8000) makes
    # Render report "no open ports detected" and fail the deploy.
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      # Secret — its VALUE is entered once in the Render dashboard (Environment
      # tab), never in git. sync:false means Render stores it and injects it into
      # every deploy/run automatically. The app reads it via os.getenv on each
      # boot, so once set it "just works" on every run. Without it, offline mode.
      - key: OPENROUTER_API_KEY
        sync: false
