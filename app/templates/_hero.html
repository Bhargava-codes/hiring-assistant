{# Deel-style pastel hero band. Params: title, subtitle (optional), badge (optional html) #}
<div class="hero px-6 py-6 mb-6">
  <div class="blob blob-lav" style="width:150px;height:150px;top:-50px;right:120px;"></div>
  <div class="blob blob-sky" style="width:170px;height:170px;top:-40px;right:-40px;"></div>
  <div class="blob blob-peach" style="width:120px;height:120px;bottom:-60px;right:260px;opacity:.5;"></div>
  <div class="hero-body flex items-end justify-between gap-4">
    <div>
      <h1 class="text-2xl font-semibold">{{ title }}</h1>
      {% if subtitle %}<p class="text-sm text-gray-500 mt-1">{{ subtitle }}</p>{% endif %}
    </div>
    {% if badge %}<div>{{ badge|safe }}</div>{% endif %}
  </div>
</div>
