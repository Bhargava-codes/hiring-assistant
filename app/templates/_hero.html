{# Clean Deel-style page header: bold title left, optional actions right. #}
<div class="flex items-end justify-between gap-4 mb-6">
  <div>
    <h1 class="text-3xl font-bold">{{ title }}</h1>
    {% if subtitle %}<p class="text-sm text-gray-500 mt-1.5">{{ subtitle }}</p>{% endif %}
  </div>
  {% if badge %}<div class="shrink-0">{{ badge|safe }}</div>{% endif %}
</div>
