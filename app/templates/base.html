<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<script>
  // Deel-flavoured light product theme.
  // Sampled from Deel: primary #1032CF, warm ink #201B1B, cream canvas #FFFBF4,
  // Inter body + a Space Grotesk display face echoing Deel's Bagoss headings.
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          display: ['"Space Grotesk"', 'Inter', 'sans-serif'],
        },
        colors: {
          brand: {
            50: '#EEF1FE', 100: '#DBE1FC', 200: '#BAC6F9', 300: '#8EA0F4',
            400: '#5B70EC', 500: '#3049E1', 600: '#1032CF', 700: '#0E27A3', 800: '#10237F',
          },
          // Warm neutral scale (stone) so greys read warm like Deel's UI.
          gray: {
            50: '#FAF8F4', 100: '#F3EEE7', 200: '#E9E2D8', 300: '#D8CFC2',
            400: '#AEA599', 500: '#7C7268', 600: '#5A514A', 700: '#433C35',
            800: '#2A241F', 900: '#201B1B',
          },
          cream: '#FFFBF4', surface: '#FFFFFF', ink: '#201B1B',
          lav: '#C9C0F5', sky: '#BFD4F6', mint: '#BCE9D4', peach: '#F7D6AE',
        },
        boxShadow: {
          soft: '0 1px 2px rgba(32,27,20,.04), 0 6px 20px rgba(32,27,20,.06)',
          card: '0 1px 3px rgba(32,27,20,.05)',
        },
      },
    },
  };
</script>
<style>
  body { background: #F6F5F2; color: #1A1A1A; font-family: 'Inter', system-ui, sans-serif;
         -webkit-font-smoothing: antialiased; }
  h1, h2, .font-display { font-family: 'Space Grotesk', 'Inter', sans-serif; letter-spacing: -.015em; }
  /* Deel signature lavender-gradient top navigation. */
  .topnav { background: linear-gradient(105deg,#E7E1F6 0%,#ECE7FA 48%,#F2EFFB 100%); }
  .topnav-link { display:flex; align-items:center; gap:.4rem; padding:.4rem .7rem; border-radius:9999px;
                 font-size:.875rem; color:#3A3540; font-weight:500; white-space:nowrap; transition:background .12s,color .12s; }
  .topnav-link:hover { background:rgba(255,255,255,.5); color:#1A1A1A; }
  .topnav-link.active { background:#fff; color:#1A1A1A; font-weight:600; box-shadow:0 1px 2px rgba(26,26,26,.08); }
  .topnav-link svg { width:1.05rem; height:1.05rem; flex:none; }
  .icon-btn { width:34px; height:34px; border-radius:9999px; background:rgba(255,255,255,.55);
              display:grid; place-items:center; color:#3A3540; transition:background .12s; }
  .icon-btn:hover { background:#fff; }
  .card { background:#fff; border:1px solid #ECEAE4; border-radius:1rem; box-shadow:0 1px 3px rgba(26,26,26,.04); }
  .badge { display:inline-flex; align-items:center; padding:.125rem .5rem; border-radius:9999px; font-size:.7rem; font-weight:600; }
  /* Filter/selector chips are pills; action buttons stay rounded rectangles (Deel). */
  .chip { display:inline-flex; align-items:center; gap:.35rem; border:1px solid #E4E1DB; background:#fff;
          border-radius:9999px; padding:.4rem .85rem; font-size:.85rem; }
  .prose-mini h1{font-size:1.35rem;font-weight:700;margin:.4rem 0 .5rem;}
  .prose-mini h2{font-size:1.05rem;font-weight:700;margin:1rem 0 .35rem;color:#201B1B;}
  .prose-mini h3{font-size:.95rem;font-weight:600;margin:.75rem 0 .25rem;}
  .prose-mini p{margin:.4rem 0;color:#433C35;font-size:.9rem;line-height:1.55;}
  .prose-mini ul,.prose-mini ol{margin:.4rem 0 .4rem 1.1rem;font-size:.9rem;color:#433C35;}
  .prose-mini li{margin:.2rem 0;}
  .prose-mini table{border-collapse:collapse;margin:.6rem 0;font-size:.85rem;width:100%;}
  .prose-mini th,.prose-mini td{border:1px solid #E9E2D8;padding:.35rem .5rem;text-align:left;}
  .prose-mini th{background:#FAF8F4;}
  .prose-mini code{background:#F3EEE7;padding:.05rem .3rem;border-radius:.25rem;font-size:.85em;}
  .prose-mini em{color:#7C7268;}
  .prose-mini strong{color:#201B1B;}
</style>

{% set nav = nav|default('') %}
<div class="min-h-screen flex flex-col text-gray-900">
  <!-- Deel-style lavender top navigation -->
  <header class="topnav sticky top-0 z-30">
    <div class="h-14 flex items-center gap-3 px-5">
      <!-- Wordmark -->
      <a href="/dashboard" class="flex items-center gap-2 shrink-0">
        <span class="w-7 h-7 rounded-xl bg-gray-900 text-white grid place-items-center font-bold text-sm font-display">C</span>
        <span class="font-display font-bold text-[15px] tracking-tight hidden sm:block">Contract HRMS</span>
      </a>
      <!-- Org switcher -->
      <div class="flex items-center gap-2 pl-3 ml-1 border-l border-black/10 shrink-0">
        <div class="w-7 h-7 rounded-full bg-gradient-to-br from-amber-300 to-brand-400"></div>
        <div class="leading-tight hidden md:block">
          <div class="text-sm font-semibold">{{ org_name }}</div>
          <div class="text-[11px] text-gray-500">All Groups</div>
        </div>
      </div>
      <!-- Primary nav -->
      <nav class="flex items-center gap-0.5 ml-2 overflow-x-auto">
        <a href="/dashboard" class="topnav-link {{ 'active' if nav=='dashboard' }}">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12l9-9 9 9M5 10v10h14V10"/></svg>Dashboard</a>
        <a href="/employees" class="topnav-link {{ 'active' if nav=='employees' }}">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 20v-2a4 4 0 00-4-4H7a4 4 0 00-4 4v2M10 10a3 3 0 100-6 3 3 0 000 6zM21 20v-2a4 4 0 00-3-3.87"/></svg>People</a>
        <a href="/requisitions" class="topnav-link {{ 'active' if nav=='requisitions' }}">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>Requisitions</a>
        <a href="/performance" class="topnav-link {{ 'active' if nav=='performance' }}">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 3v18h18M7 14l3-3 4 4 5-6"/></svg>Performance</a>
        <a href="/payroll" class="topnav-link {{ 'active' if nav=='payroll' }}">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>Payroll</a>
        <a href="/leave" class="topnav-link {{ 'active' if nav=='leave' }}">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 7V3m8 4V3M3 11h18M5 5h14a2 2 0 012 2v12a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2z"/></svg>Leave</a>
      </nav>
      <!-- Right cluster -->
      <div class="ml-auto flex items-center gap-1.5 shrink-0">
        {% if not llm_online() %}
        <span class="text-[11px] font-medium bg-amber-100 text-amber-700 rounded-full px-2.5 py-1 hidden lg:inline">Offline mode</span>
        {% endif %}
        <div class="icon-btn" title="Search"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg></div>
        <a href="/settings" class="icon-btn {{ 'ring-2 ring-brand-400' if nav=='settings' }}" title="Settings"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-2.82 1.17V21a2 2 0 11-4 0v-.09A1.65 1.65 0 006 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06A1.65 1.65 0 004.6 15H4.5a2 2 0 110-4h.09A1.65 1.65 0 006 9.4"/></svg></a>
        <div class="icon-btn" title="Help"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.1 9a3 3 0 015.8 1c0 2-3 3-3 3M12 17h.01"/></svg></div>
        <div class="icon-btn" title="Notifications"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8a6 6 0 00-12 0c0 7-3 9-3 9h18s-3-2-3-9M13.7 21a2 2 0 01-3.4 0"/></svg></div>
        <div class="w-8 h-8 rounded-full bg-brand-100 text-brand-700 grid place-items-center text-xs font-semibold ml-0.5" title="{{ current_user }}">HA</div>
      </div>
    </div>
  </header>

  <main class="flex-1 overflow-auto">
    <div class="max-w-[1440px] mx-auto px-6 lg:px-8 py-7">
      {% block content %}{% endblock %}
    </div>
  </main>
</div>
{% block scripts %}{% endblock %}
